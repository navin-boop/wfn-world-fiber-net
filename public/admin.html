const { useState, useEffect, useRef, useMemo } = React;

function Icon({ name, size=16, color='currentColor', strokeWidth=1.75 }) {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current && window.lucide) {
      ref.current.innerHTML = '';
      const el = document.createElement('i');
      el.setAttribute('data-lucide', name);
      Object.assign(el.style, { width:size+'px', height:size+'px', color });
      ref.current.appendChild(el);
      window.lucide.createIcons({ nodes:[el] });
      const svg = ref.current.querySelector('svg');
      if (svg) { svg.setAttribute('stroke-width', strokeWidth); svg.style.display='block'; }
    }
  }, [name, size, color]);
  return <span ref={ref} style={{ display:'inline-flex', alignItems:'center', justifyContent:'center' }} />;
}

  };
  return <span style={{ display:'inline-flex', alignItems:'center', padding:'2px 9px', borderRadius:9999, fontSize:10, fontWeight:700, letterSpacing:'0.05em', textTransform:'uppercase', ...colors[color] }}>{children}</span>;
}

function Btn({ children, onClick, variant='primary', size='sm', style={} }) {
  const base = { display:'inline-flex', alignItems:'center', gap:6, borderRadius:9999, fontWeight:600, border:'none', transition:'all 0.12s', cursor:'pointer', fontFamily:'Inter,sans-serif' };
  const variants = {
    primary:{ background:'var(--green)', color:'#0d0d0d' },
    outline:{ background:'#fff', color:'var(--gray-700)', border:'1px solid var(--border-md)' },
    ghost:{ background:'transparent', color:'var(--gray-600)' },
    danger:{ background:'#fef2f2', color:'#b91c1c', border:'1px solid #fecaca' },
  };
  const sizes = { xs:{padding:'5px 10px',fontSize:11}, sm:{padding:'7px 14px',fontSize:12}, md:{padding:'9px 18px',fontSize:13} };
  return <button onClick={onClick} style={{...base,...variants[variant],...sizes[size],...style}}>{children}</button>;
}

/* ── Mini Chart ── */
function MiniChart({ data, color='#18E299' }) {
  const max = Math.max(...data);
  const w = 120, h = 40;
  const pts = data.map((v,i) => `${(i/(data.length-1))*w},${h - (v/max)*h}`).join(' ');
  return (
    <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} style={{ display:'block' }}>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
      <polygon points={`${pts} ${w},${h} 0,${h}`} fill={color} opacity="0.1" />
    </svg>
  );
}

/* ── TICKETS ── */
function Tickets() {
  const [tickets, setTickets] = useState(TICKETS);

    <div style={{ padding:24, display:'flex', flexDirection:'column', gap:16, height:'100%', overflowY:'auto' }}>

function Login({ onLogin }) {
  const [email, setEmail] = useState('');

  return (

          </div>
          <div>
            <div style={{ fontSize:10, fontWeight:600, letterSpacing:'0.06em', textTransform:'uppercase', color:'var(--gray-500)', marginBottom:6 }}>Password</div>
            <input type="password" value={pw} onChange={e => setPw(e.target.value)} onKeyDown={e => e.key==='Enter'&&submit()} placeholder="••••••••" style={{ width:'100%', border:`1px solid ${err?'#ef4444':'var(--border-md)'}`, borderRadius:9999, padding:'11px 16px', fontSize:13, outline:'none', color:'#0d0d0d' }} />
          </div>

}
