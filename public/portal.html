const { useState, useEffect, useRef } = React;

function Icon({ name, size=16, color='currentColor', strokeWidth=1.75 }) {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current && window.lucide) {
      ref.current.innerHTML = '';
      const el = document.createElement('i');
      el.setAttribute('data-lucide', name);
      Object.assign(el.style, { width:size+'px', height:size+'px', color });
      ref.current.appendChild(el);
      window.lucide.createIcons({ nodes:[el] });
      const svg = ref.current.querySelector('svg');
      if (svg) { svg.setAttribute('stroke-width', strokeWidth); svg.style.display='block'; }
    }
  }, [name, size, color]);
  return <span ref={ref} style={{ display:'inline-flex', alignItems:'center', justifyContent:'center' }} />;
}

function Logo({ dark=false }) {
  const c = dark ? '#ededed' : '#0d0d0d';
  return (

        <path d="M4 18 Q4 14 16 14" stroke="#18E299" strokeWidth="2.5" strokeLinecap="round" opacity="0.3"/>

      <span style={{ fontSize:14, fontWeight:600, letterSpacing:'-0.01em', color:c }}>World Fiber Net</span>

  );
}

function Badge({ children, color='green' }) {
  const colors = {
    green:{ background:'var(--green-50)', color:'var(--green-700)' },
    red:{ background:'#fef2f2', color:'#b91c1c' },
    yellow:{ background:'#fffbeb', color:'#92400e' },
    gray:{ background:'var(--gray-100)', color:'var(--gray-600)' },
    blue:{ background:'#eff6ff', color:'#1d4ed8' },
  };
  return <span style={{ display:'inline-flex', alignItems:'center', padding:'2px 9px', borderRadius:9999, fontSize:10, fontWeight:700, letterSpacing:'0.05em', textTransform:'uppercase', ...colors[color] }}>{children}</span>;
}

function Btn({ children, onClick, variant='primary', size='sm', style={} }) {
  const base = { display:'inline-flex', alignItems:'center', gap:6, borderRadius:9999, fontWeight:600, border:'none', transition:'all 0.12s', cursor:'pointer', fontFamily:'Inter,sans-serif' };
  const variants = {
    primary:{ background:'var(--green)', color:'#0d0d0d' },
    outline:{ background:'#fff', color:'var(--gray-700)', border:'1px solid var(--border-md)' },
    ghost:{ background:'transparent', color:'var(--gray-600)' },
    danger:{ background:'#fef2f2', color:'#b91c1c', border:'1px solid #fecaca' },
  };
  const sizes = { xs:{padding:'5px 10px',fontSize:11}, sm:{padding:'7px 14px',fontSize:12}, md:{padding:'10px 20px',fontSize:13}, lg:{padding:'13px 28px',fontSize:14} };
  return <button onClick={onClick} style={{...base,...variants[variant],...sizes[size],...style}}>{children}</button>;
}

/* ── SPEED TEST ── */
function SpeedTest() {
  const [state, setState] = useState('idle'); // idle, testing, done
  const [progress, setProgress] = useState(0);
  const [dl, setDl] = useState(0);
  const [ul, setUl] = useState(0);
  const [ping, setPing] = useState(0);

  const runTest = () => {
    setState('testing'); setProgress(0); setDl(0); setUl(0); setPing(0);
    let p = 0;
    const t = setInterval(() => {
      p += 2;
      setProgress(p);
      if (p < 50) setDl(Math.round(p * 2));
      else if (p < 80) { setDl(94); setUl(Math.round((p-50) * 3)); }
      else { setDl(94); setUl(92); setPing(2); }
      if (p >= 100) { clearInterval(t); setState('done'); }
    }, 50);
  };

  const r = progress / 100;
  const circumference = 2 * Math.PI * 80;

  return (
    <div style={{ padding:24, overflowY:'auto', height:'100%', display:'flex', flexDirection:'column', gap:16 }}>
      <div style={{ background:'#fff', border:'1px solid var(--border)', borderRadius:20, padding:'40px', textAlign:'center', boxShadow:'var(--shadow-sm)' }}>
        {/* Gauge */}
        <div style={{ position:'relative', width:200, height:200, margin:'0 auto 24px' }}>
          <svg width="200" height="200" viewBox="0 0 200 200">
            <circle cx="100" cy="100" r="80" fill="none" stroke="var(--gray-100)" strokeWidth="8"/>
            <circle cx="100" cy="100" r="80" fill="none" stroke="var(--green)" strokeWidth="8"
              strokeDasharray={`${r * circumference} ${circumference}`}
              strokeLinecap="round" transform="rotate(-90 100 100)" style={{ transition:'stroke-dasharray 0.1s' }}/>
            <circle cx="100" cy="100" r="60" fill="var(--green-50)"/>
          </svg>
          <div style={{ position:'absolute', inset:0, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center' }}>
            {state === 'idle' && <div style={{ fontSize:13, color:'var(--gray-500)' }}>Ready</div>}
            {state === 'testing' && <>
              <div style={{ fontFamily:'Geist Mono,monospace', fontSize:28, fontWeight:500, color:'var(--green-700)' }}>{progress}%</div>
              <div style={{ fontSize:11, color:'var(--gray-500)', marginTop:2 }}>Testing…</div>
            </>}
            {state === 'done' && <>
              <div style={{ fontFamily:'Geist Mono,monospace', fontSize:28, fontWeight:600, color:'var(--green-700)' }}>{dl}</div>
              <div style={{ fontSize:11, color:'var(--gray-500)' }}>Mbps Down</div>
            </>}
          </div>
        </div>
        {/* Results */}
        <div style={{ display:'flex', justifyContent:'center', gap:32, marginBottom:28 }}>
          {[['download','Download',dl,'Mbps'],['upload','Upload',ul,'Mbps'],['activity','Ping',ping,'ms']].map(([icon,label,val,unit]) => (
            <div key={label} style={{ textAlign:'center' }}>
              <div style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:5, marginBottom:4 }}>
                <Icon name={icon} size={13} color="var(--gray-400)" />
                <span style={{ fontSize:10, color:'var(--gray-500)', textTransform:'uppercase', letterSpacing:'0.05em', fontWeight:600 }}>{label}</span>
              </div>
              <div style={{ fontFamily:'Geist Mono,monospace', fontSize:22, fontWeight:500, color: val>0 ? 'var(--green-700)' : 'var(--gray-300)' }}>{val || '—'}</div>
              <div style={{ fontSize:10, color:'var(--gray-400)' }}>{unit}</div>
            </div>
          ))}
        </div>
        <button onClick={runTest} disabled={state==='testing'} style={{ background: state==='testing' ? 'var(--gray-200)' : 'var(--green)', border:'none', borderRadius:9999, padding:'13px 36px', fontSize:14, fontWeight:600, cursor: state==='testing' ? 'not-allowed' : 'pointer', fontFamily:'Inter,sans-serif', color: state==='testing' ? 'var(--gray-500)' : '#0d0d0d', transition:'all 0.15s' }}>
          {state === 'idle' ? 'Start Speed Test' : state === 'testing' ? 'Testing…' : 'Test Again'}
        </button>
        {state === 'done' && (
          <div style={{ marginTop:20, padding:'14px 20px', background:'var(--green-50)', borderRadius:12, display:'inline-block' }}>
            <div style={{ fontSize:13, color:'var(--green-700)', fontWeight:500 }}>
              Your connection is performing at expected speeds for your Home Fiber 100Mbps plan.
            </div>
          </div>
        )}
      </div>
      {/* History */}
      <div style={{ background:'#fff', border:'1px solid var(--border)', borderRadius:16, padding:'22px 24px', boxShadow:'var(--shadow-sm)' }}>
        <div style={{ fontWeight:600, fontSize:14, marginBottom:14 }}>Speed Test History</div>
        <div style={{ display:'flex', flexDirection:'column', gap:1 }}>
          {[
            { date:'Apr 27, 2025', dl:94, ul:92, ping:2 },
            { date:'Apr 20, 2025', dl:97, ul:95, ping:3 },
            { date:'Apr 12, 2025', dl:89, ul:88, ping:2 },
            { date:'Apr 5, 2025', dl:93, ul:91, ping:2 },
          ].map((r, i) => (
            <div key={i} style={{ display:'flex', alignItems:'center', gap:20, padding:'10px 0', borderBottom: i<3 ? '1px solid var(--border)' : 'none' }}>
              <div style={{ fontSize:12, color:'var(--gray-500)', minWidth:100 }}>{r.date}</div>
              <div style={{ display:'flex', gap:24, flex:1 }}>
                {[['Download',r.dl,'Mbps'],['Upload',r.ul,'Mbps'],['Ping',r.ping,'ms']].map(([l,v,u]) => (
                  <div key={l} style={{ textAlign:'center' }}>
                    <div style={{ fontSize:10, color:'var(--gray-400)' }}>{l}</div>
                    <div style={{ fontFamily:'Geist Mono,monospace', fontSize:13, fontWeight:500, color:'var(--green-700)' }}>{v} <span style={{ fontSize:10, color:'var(--gray-400)' }}>{u}</span></div>
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

                <div style={{ fontSize:10, fontWeight:600, letterSpacing:'0.06em', textTransform:'uppercase', color:'var(--gray-500)', marginBottom:5 }}>{label}</div>
                <input type="password" value={pw[key]} onChange={e => setPw(p=>({...p,[key]:e.target.value}))} placeholder="••••••••" style={{ width:'100%', border:'1px solid var(--border-md)', borderRadius:9999, padding:'9px 14px', fontSize:13, outline:'none', color:'#0d0d0d' }} />
              </div>
            ))}
            <Btn style={{ marginTop:4 }}>Update Password</Btn>
          </div>
          <div style={{ marginTop:24, paddingTop:20, borderTop:'1px solid var(--border)' }}>
            <div style={{ fontWeight:600, fontSize:13, marginBottom:12 }}>Notification Preferences</div>
            <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
              {[['SMS billing reminders','sms',true],['Email payment receipts','email',true],['Outage notifications','outage',true],['Promotional offers','promo',false]].map(([label, key, def]) => (
                <label key={key} style={{ display:'flex', alignItems:'center', justifyContent:'space-between', cursor:'pointer' }}>
                  <span style={{ fontSize:13, color:'var(--gray-700)' }}>{label}</span>
                  <Toggle defaultChecked={def} />
                </label>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function Toggle({ defaultChecked }) {
  const [on, setOn] = useState(defaultChecked);
  return (
    <div onClick={() => setOn(!on)} style={{ width:36, height:20, borderRadius:9999, background: on ? 'var(--green)' : 'var(--gray-200)', position:'relative', cursor:'pointer', transition:'background 0.2s', flexShrink:0 }}>
      <div style={{ position:'absolute', top:2, left: on ? 18 : 2, width:16, height:16, borderRadius:'50%', background:'#fff', boxShadow:'var(--shadow-sm)', transition:'left 0.2s' }}></div>
    </div>
  );
}

/* ── LOGIN ── */
function Login({ onLogin }) {
  const [id, setId] = useState('');
  const [pw, setPw] = useState('');
  const [err, setErr] = useState(false);
  const submit = () => {
    if ((id === 'C001' || id === 'ramesh@gmail.com') && pw === 'pass123') { onLogin(); }
    else { setErr(true); setTimeout(() => setErr(false), 2500); }
  };
  return (
    <div style={{ height:'100vh', display:'flex', overflow:'hidden' }}>
      {/* Left panel */}
      <div style={{ flex:1, background:'linear-gradient(155deg,#0a7f55,#0d4f3c)', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:48, color:'#fff' }}>
        <Logo dark />
        <div style={{ marginTop:48, textAlign:'center' }}>
          <h1 style={{ fontSize:32, fontWeight:600, letterSpacing:'-0.025em', lineHeight:1.2, marginBottom:12 }}>Manage your connection from anywhere</h1>
          <p style={{ fontSize:15, opacity:0.7, lineHeight:1.7, maxWidth:320 }}>Pay bills, check speeds, upgrade plans, and get support — all in one place.</p>
        </div>
        <div style={{ marginTop:48, display:'flex', flexDirection:'column', gap:12, width:'100%', maxWidth:280 }}>
          {[
            { icon:'credit-card', text:'Pay bills with eSewa or Khalti' },
            { icon:'trending-up', text:'Upgrade or change your plan' },
            { icon:'zap', text:'Run speed tests anytime' },
            { icon:'message-circle', text:'Open and track support tickets' },
          ].map(({ icon, text }) => (
            <div key={text} style={{ display:'flex', gap:12, alignItems:'center' }}>
              <div style={{ width:32, height:32, borderRadius:8, background:'rgba(255,255,255,0.12)', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                <Icon name={icon} size={15} color="rgba(255,255,255,0.8)" />
              </div>
              <div style={{ fontSize:13, opacity:0.8 }}>{text}</div>
            </div>
          ))}
        </div>
      </div>
      {/* Right panel */}
      <div style={{ width:480, background:'#fff', display:'flex', alignItems:'center', justifyContent:'center', padding:48 }}>
        <div style={{ width:'100%', maxWidth:360 }}>
          <div style={{ marginBottom:32 }}>
            <h2 style={{ fontSize:24, fontWeight:600, letterSpacing:'-0.02em', marginBottom:6 }}>Sign in to your account</h2>
            <div style={{ fontSize:13, color:'var(--gray-500)' }}>Enter your customer ID or email to continue.</div>
          </div>
          <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
            <div>
              <div style={{ fontSize:10, fontWeight:600, letterSpacing:'0.06em', textTransform:'uppercase', color:'var(--gray-500)', marginBottom:6 }}>Customer ID or Email</div>
              <input value={id} onChange={e => setId(e.target.value)} placeholder="e.g. C001 or you@email.com" style={{ width:'100%', border:'1px solid var(--border-md)', borderRadius:9999, padding:'12px 16px', fontSize:13, outline:'none', color:'#0d0d0d' }} />
            </div>
            <div>
              <div style={{ fontSize:10, fontWeight:600, letterSpacing:'0.06em', textTransform:'uppercase', color:'var(--gray-500)', marginBottom:6 }}>Password</div>
              <input type="password" value={pw} onChange={e => setPw(e.target.value)} onKeyDown={e => e.key==='Enter'&&submit()} placeholder="••••••••" style={{ width:'100%', border:`1px solid ${err?'#ef4444':'var(--border-md)'}`, borderRadius:9999, padding:'12px 16px', fontSize:13, outline:'none', color:'#0d0d0d' }} />
            </div>
            {err && <div style={{ fontSize:12, color:'#ef4444', textAlign:'center' }}>Invalid credentials. Try C001 / pass123</div>}
            <button onClick={submit} style={{ background:'var(--green)', border:'none', borderRadius:9999, padding:'13px', fontSize:14, fontWeight:600, cursor:'pointer', fontFamily:'Inter,sans-serif', color:'#0d0d0d', marginTop:4 }}>Sign In</button>
          </div>
          <div style={{ textAlign:'center', marginTop:16, fontSize:11, color:'var(--gray-400)' }}>Demo: C001 / pass123</div>
          <div style={{ marginTop:28, paddingTop:20, borderTop:'1px solid var(--border)', textAlign:'center' }}>
            <div style={{ fontSize:13, color:'var(--gray-500)', marginBottom:12 }}>Don't have an account yet?</div>
            <a href="index.html" style={{ fontSize:13, fontWeight:600, color:'var(--green-700)', textDecoration:'none' }}>Get Connected →</a>
          </div>
          <div style={{ textAlign:'center', marginTop:16 }}>
            <a href="admin.html" style={{ fontSize:11, color:'var(--gray-400)', textDecoration:'none' }}>Admin login →</a>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── APP ── */
const PAGES = { overview:Overview, plan:MyPlan, billing:Billing, tickets:SupportTickets, speedtest:SpeedTest, profile:Profile };
const TITLES = { overview:'Overview', plan:'My Plan', billing:'Billing', tickets:'Support', speedtest:'Speed Test', profile:'My Profile' };

function App() {
  const [authed, setAuthed] = useState(false);
  const [page, setPage] = useState('overview');
  if (!authed) return <Login onLogin={() => setAuthed(true)} />;
  const PageComp = PAGES[page] || Overview;
  return (
    <div style={{ display:'flex', height:'100vh', overflow:'hidden' }}>
      <Sidebar page={page} setPage={setPage} onLogout={() => setAuthed(false)} />
      <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden' }}>
        <TopBar title={TITLES[page]} />
        <div style={{ flex:1, overflow:'hidden' }}>
          <PageComp setPage={setPage} />
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
